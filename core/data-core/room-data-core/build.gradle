apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: 'com.google.devtools.ksp'

android {
    namespace "${rootProject.ext.namespace}.core.data.room"
}

dependencies {
    // room
    api "androidx.room:room-runtime:${parent.ext.roomVersion}"
    api "androidx.room:room-ktx:${parent.ext.roomVersion}"
    ksp "androidx.room:room-compiler:${parent.ext.roomVersion}"
}

ksp {
    arg("room.schemaLocation", "$projectDir/schemas")
}
