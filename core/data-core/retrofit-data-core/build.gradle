apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"

android {
    namespace "${rootProject.ext.namespace}.core.data.retrofit"
}

dependencies {
    // domain layer
    implementation project(":domain:auth-domain")

    // retrofit2 & coroutines
    api 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0'
    api 'com.squareup.okio:okio:3.9.0'
    api "com.squareup.retrofit2:retrofit:${parent.ext.retrofitVersion}"
    api "com.squareup.retrofit2:converter-gson:${parent.ext.retrofitVersion}"

    implementation "androidx.datastore:datastore-preferences:${parent.ext.dataStoreVersion}"
    api "androidx.datastore:datastore-preferences-core:${parent.ext.dataStoreVersion}"
}
