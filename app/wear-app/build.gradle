apply plugin: "com.android.application"
apply plugin: 'com.google.devtools.ksp'
apply plugin: "dagger.hilt.android.plugin"
apply plugin: 'org.jetbrains.kotlin.android'
apply plugin: "com.google.gms.google-services"

android {
    namespace "${rootProject.ext.namespace}"

    compileSdk 35

    compileOptions {
        sourceCompatibility rootProject.ext.javaVersion
        targetCompatibility rootProject.ext.javaVersion
    }

    kotlinOptions {
        jvmTarget = rootProject.ext.javaVersion.toString()
    }

    buildFeatures {
        compose true
    }

    composeOptions {
        kotlinCompilerExtensionVersion = "1.5.14"
    }

    defaultConfig {
        minSdk          30
        targetSdk       34
        versionCode     24
        versionName     "2.0.2"
        vectorDrawables {
            useSupportLibrary true
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        resources {
            excludes += "/META-INF/{AL2.0,LGPL2.1}"
        }
    }
}

dependencies {
    implementation project(":presentation:wear-view-presentation")
    implementation project(":core:data-core")

    // dagger & hilt
    implementation group: "javax.inject", name: "javax.inject", version: "1"
    implementation "com.google.dagger:hilt-android:${rootProject.ext.hiltVersion}"
    implementation "androidx.hilt:hilt-work:${rootProject.ext.hiltWorkerVersion}"
    ksp "com.google.dagger:dagger-compiler:${rootProject.ext.hiltVersion}"
    ksp "com.google.dagger:hilt-compiler:${rootProject.ext.hiltVersion}"

    // fcm
    implementation platform("com.google.firebase:firebase-bom:${rootProject.ext.firebaseVersion}")
    implementation "com.google.firebase:firebase-messaging-ktx:${rootProject.ext.fcmVersion}"
}