apply plugin: "com.android.application"
apply plugin: 'com.google.devtools.ksp'
apply plugin: "dagger.hilt.android.plugin"
//apply plugin: "com.google.gms.google-services"
apply plugin: 'org.jetbrains.kotlin.android'

android {
    namespace "${rootProject.ext.namespace}.app.wear"

    compileSdk 35

    compileOptions {
        sourceCompatibility rootProject.ext.javaVersion
        targetCompatibility rootProject.ext.javaVersion
    }

    kotlinOptions {
        jvmTarget = rootProject.ext.javaVersion.toString()
    }

    buildFeatures {
        compose true
    }

    composeOptions {
        kotlinCompilerExtensionVersion = "1.5.14"
    }

    defaultConfig {
        minSdk          30
        targetSdk       34
        versionCode     24
        versionName     "2.0.2"
        vectorDrawables {
            useSupportLibrary true
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        resources {
            excludes += "/META-INF/{AL2.0,LGPL2.1}"
        }
    }
}

dependencies {
    implementation project(":presentation:wear-view-presentation")
    implementation project(":presentation:viewmodel-presentation")

    // dagger & hilt
    implementation group: "javax.inject", name: "javax.inject", version: "1"
    implementation "com.google.dagger:hilt-android:${rootProject.ext.hiltVersion}"
    ksp "com.google.dagger:dagger-compiler:${rootProject.ext.hiltVersion}"
    ksp "com.google.dagger:hilt-compiler:${rootProject.ext.hiltVersion}"

//    implementation "androidx.compose.foundation:foundation-layout-android:1.8.2"
//    implementation 'androidx.core:core-ktx:1.16.0'

    // compose
//    implementation "androidx.hilt:hilt-navigation-compose:${this.ext.hiltNavigationVersion}"
//    implementation "androidx.wear.compose:compose-material:${this.ext.composeVersion}"
//    implementation "androidx.wear.compose:compose-foundation:${this.ext.composeVersion}"
//    implementation "androidx.wear.compose:compose-navigation:${this.ext.composeVersion}"
//
//    implementation "androidx.compose.runtime:runtime-livedata:${this.ext.composeWearVersion}"
//    implementation "androidx.compose.material:material-icons-extended:${this.ext.composeWearVersion}"
//    implementation "androidx.compose.ui:ui-tooling-preview:${this.ext.composeWearVersion}"
//    debugImplementation "androidx.compose.ui:ui-tooling:${this.ext.composeWearVersion}"
}