android {
    namespace "${rootProject.ext.namespace}.data.member"
}

dependencies {
    // application layer
    implementation project(":application:member-application")
    // core layer
    implementation project(":core:data-core:mqtt-data-core")
    implementation project(":core:data-core:retrofit-data-core")
    // data store
    implementation "androidx.datastore:datastore-preferences:${parent.ext.dataStoreVersion}"
    implementation "androidx.datastore:datastore-preferences-core:${parent.ext.dataStoreVersion}"
    // billing
    implementation "com.android.billingclient:billing-ktx:${rootProject.ext.billingClientVersion}"
}